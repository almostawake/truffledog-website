name: notify-deploy
on: page_build
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: ntfy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MSG=$(gh api repos/${{ github.repository }}/commits/${{ github.event.build.commit }} --jq '.commit.message' | head -1)
          if [ "${{ github.event.build.status }}" = "built" ]; then
            curl -d "✅ $MSG" https://ntfy.sh/tdd-deployed
          else
            curl -d "❌ $MSG" https://ntfy.sh/tdd-deployed
          fi
